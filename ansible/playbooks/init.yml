- name: Build Control Nodes
  hosts: masters
  become: true
  tasks:
    - name: Restart keepalived
      service:
        name: keepalived
        state: restarted
    - name: Restart haproxy
      service:
        name: haproxy
        state: restarted
    - name: Copy kubeadm-config.yml to node
      template:
        src: ../kubeadm-config.j2
        dest: /etc/kubernetes/kubeadm-config.yml
      tags:
        - move
    - name: Init
      shell:
        kubeadm init --config /etc/kubernetes/kubeadm-config.yml -v5 && \
        mkdir $HOME/.kube && \
        ln -s /etc/kubernetes/admin.conf $HOME/.kube/config && \
        chown ubuntu:ubuntu $HOME/.kube && \
        chown ubuntu:ubuntu $HOME/.kube/config
    




