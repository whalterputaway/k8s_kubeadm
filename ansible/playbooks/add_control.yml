- name: Add secondary control Nodes
  become: true
  hosts: masters
  tasks:
    - name: Get join command
      shell:
        kubeadm token create --print-join-command
      register: command1
      when: inventory_hostname == "master1"
    - name: get certificate
      shell:
        kubeadm init phase upload-certs --upload-certs
      register: command2
      when: inventory_hostname == "master1"
    - ansible.builtin.set_fact:
        join_control: "{{ command1.stdout }} --certificate-key {{ command2.stdout_lines[2] }}"
      when: inventory_hostname == "master1"
    - name: Propagate join_control fact to all hosts
      set_fact:
        join_control: "{{ hostvars['master1']['join_control'] }}"
      when: inventory_hostname != "master1"
    - name: Join other control nodes
      shell:
        "{{ join_control }} --control-plane"
      ignore_errors: true
      when: inventory_hostname != "master1"
      tags:
        - control
    - name: Set Admin Config
      shell:
        mkdir $HOME/.kube && \
        ln -s /etc/kubernetes/admin.conf $HOME/.kube/config
      when: inventory_hostname != "master1"
      ignore_errors: true


    
      