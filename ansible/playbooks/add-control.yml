- name: Add secondary control Nodes
  become: true
  hosts: masters
  tasks:
    - name: Create bootstrap-token
      shell:
        kubeadm token create --print-join-command
      register: command1
      when: inventory_hostname == "master1"
    - name: Certificates work
      shell:
        kubeadm init phase upload-certs --upload-certs
      register: command2
      when: inventory_hostname == "master1"
    - ansible.builtin.set_fact:
        join_control: "{{ command1.stdout }}--certificate-key {{ command2.stdout_lines[2] }}"
      when: inventory_hostname == "master1"
    - name: Join other control nodes
      shell:
        "{{ hostvars['master1']['join_control'] }} --control-plane"
      ignore_errors: true
    - name: Set Admin Config
      shell:
        mkdir $HOME/.kube && \
        ln -s /etc/kubernetes/admin.conf $HOME/.kube/config
      ignore_errors: true
    

- name: Add workers Nodes
  hosts: workers
  become: true
  tasks:
    - name: Add node
      shell: "{{ hostvars['master1']['command1'] }}"
      